[[headers]]
  for = "static/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "src/styles/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "/*"
    [headers.values]
      Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
