[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache"
[[headers]]
  for = "page-data/*"
  [headers.values]
    Cache-Control = "no-cache"
[[headers]]
  for = "static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"


[[headers]]
  for = "/*"
    [headers.values]
      Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
